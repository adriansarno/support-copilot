name: Acquisition Pipeline CI

on:
  push:
    branches: [main]

jobs:
  build-and-run:
    if: contains(github.event.head_commit.message, '/run-acquisition')
    runs-on: ubuntu-latest

    env:
      REGISTRY: us-central1-docker.pkg.dev
      PROJECT: ${{ secrets.GCP_PROJECT }}
      REPO: images
      IMAGE: acquisition

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          docker build -t $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }} \
                        -t $REGISTRY/$PROJECT/$REPO/$IMAGE:latest \
                        ./acquisition
          docker push $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }}
          docker push $REGISTRY/$PROJECT/$REPO/$IMAGE:latest

      - name: Run acquisition pipeline
        run: |
          docker run --rm \
            -e GCP_PROJECT=${{ secrets.GCP_PROJECT }} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json \
            -v ${{ github.workspace }}/shared:/app/shared:ro \
            $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }} \
            run --source-dir /app/data --version ${{ github.run_number }}
