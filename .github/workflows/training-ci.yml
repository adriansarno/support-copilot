name: Training Pipeline CI

on:
  push:
    branches: [main]

jobs:
  build-and-train:
    if: contains(github.event.head_commit.message, '/run-training')
    runs-on: ubuntu-latest

    env:
      REGISTRY: us-central1-docker.pkg.dev
      PROJECT: ${{ secrets.GCP_PROJECT }}
      REPO: images
      IMAGE: training

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          docker build -t $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }} \
                        -t $REGISTRY/$PROJECT/$REPO/$IMAGE:latest \
                        ./training
          docker push $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }}
          docker push $REGISTRY/$PROJECT/$REPO/$IMAGE:latest

      - name: Run training pipeline
        run: |
          docker run --rm \
            -e GCP_PROJECT=${{ secrets.GCP_PROJECT }} \
            -e WANDB_API_KEY=${{ secrets.WANDB_API_KEY }} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json \
            -v ${{ github.workspace }}/shared:/app/shared:ro \
            $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }} \
            run --max-samples 5000 --epochs 3

      - name: Validate metrics
        run: |
          echo "Checking training metrics..."
          docker run --rm \
            $REGISTRY/$PROJECT/$REPO/$IMAGE:${{ github.sha }} \
            eval-reranker --model-path ./models/reranker \
                          --val-path ./datasets/reranker/val.jsonl
